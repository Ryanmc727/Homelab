server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /etc/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    timeout: 30s
    batchsize: 65536
    batchwait: 1s
    backoff_config:
      min_period: 1s
      max_period: 30s
      max_retries: 10

scrape_configs:
  - job_name: suricata-alerts
    static_configs:
      - targets: [localhost]
        labels:
          job: suricata
          log_type: alert
          host: ubuntu-lab
          __path__: /var/log/suricata/fast.log

  - job_name: auth-log
    static_configs:
      - targets: [localhost]
        labels:
          job: auth
          host: ubuntu-lab
          __path__: /var/log/host/auth.log

  - job_name: syslog
    static_configs:
      - targets: [localhost]
        labels:
          job: syslog
          host: ubuntu-lab
          __path__: /var/log/host/syslog
