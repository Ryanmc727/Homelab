{
    "device.node_id": "homelab-honeypot",
    "device.name": "homelab-honeypot",

    "ip.ignorelist": [
        "YOUR_SERVER_IP",
        "127.0.0.1"
    ],

    "ftp.enabled": true,
    "ftp.port": 21,

    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3",

    "telnet.enabled": true,
    "telnet.port": 23,

    "http.enabled": true,
    "http.port": 80,
    "http.skin": "nasLogin",

    "mysql.enabled": true,
    "mysql.port": 3306,
    "mysql.banner": "8.0.32",

    "redis.enabled": true,
    "redis.port": 6379,

    "smb.enabled": false,

    "vnc.enabled": false,

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "file": {
                    "class": "logging.handlers.RotatingFileHandler",
                    "filename": "/var/log/opencanary/opencanary.log",
                    "maxBytes": 10485760,
                    "backupCount": 5,
                    "formatter": "plain"
                }
            }
        }
    }
}
